<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenteLeve - Edição Vencedora PRO</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text-main: #1e293b; --text-sub: #64748b;
            --primary: #6366f1; --accent: #818cf8; --danger: #ef4444; --success: #10b981;
            --border: #e2e8f0;
        }

        /* CONFIGURAÇÃO DO MODO ESCURO */
        .dark-mode {
            --bg: #0f172a; --card: #1e293b; --text-main: #f1f5f9; --text-sub: #94a3b8;
            --primary: #818cf8; --accent: #4f46e5; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; transition: all 0.2s ease; }
        body { background-color: #cbd5e0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-main); }

        #app {
            width: 100%; max-width: 450px; background: var(--bg);
            min-height: 100vh; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1); padding-bottom: 100px;
        }

        header {
            padding: 25px 20px; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }

        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .progress-container { width: 100%; height: 8px; background: rgba(0,0,0,0.1); border-radius: 10px; margin-top: 15px; }
        .progress-bar { height: 100%; background: #fff; width: 0%; border-radius: 10px; transition: width 0.8s; }

        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); padding: 18px; border-radius: 24px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        h3 { font-size: 1.1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        .chart-container {
            display: flex; align-items: flex-end; justify-content: space-around;
            height: 140px; padding: 10px; background: rgba(0,0,0,0.02); border-radius: 15px; margin-bottom: 30px;
        }
        .bar { width: 25px; background: var(--primary); border-radius: 6px 6px 2px 2px; position: relative; transition: height 1s; }
        .bar-label { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; font-weight: 700; color: var(--text-sub); }

        .circle-wrap { height: 160px; display: flex; align-items: center; justify-content: center; }
        .circle { width: 100px; height: 100px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; transition: 4s ease-in-out; }
        .expanding { transform: scale(1.5); background: var(--success); }

        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px; }
        input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text-main); outline: none; margin-bottom: 10px; }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 450px;
            background: var(--card); display: grid; grid-template-columns: repeat(6, 1fr);
            padding: 10px 5px; border-top: 1px solid var(--border); z-index: 100;
        }
        .nav-item { border: none; background: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 1.2rem; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 0.55rem; font-weight: 700; margin-top: 4px; }

        .msg-bubble { background: var(--bg); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary); font-size: 0.9rem; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <div class="header-top">
                <div>
                    <h2 style="font-size: 1.1rem; display: flex; align-items: center; gap: 10px;">
                        MenteLeve 
                        <button onclick="toggleDarkMode()" style="background:none; border:none; color:white; cursor:pointer; font-size: 1.2rem;">
                            <i class="ph ph-moon-stars"></i>
                        </button>
                    </h2>
                    <span id="levelLabel" style="font-size: 0.7rem; opacity: 0.9; font-weight: 700;">Semente da Paz</span>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 1.2rem; font-weight: 800;"><i class="ph ph-sparkle-fill"></i> <span id="pts">0</span></div>
                </div>
            </div>
            <div class="progress-container"><div id="levelBar" class="progress-bar"></div></div>
        </header>

        <section id="stats" class="page active">
            <div class="card">
                <h3><i class="ph ph-chart-line-up"></i> Evolução</h3>
                <div class="chart-container" id="moodChart"></div>
            </div>
            <div class="card">
                <h3><i class="ph ph-heart"></i> Gratidão</h3>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="gratitudeIn" placeholder="Agradeço por..." style="margin:0;">
                    <button onclick="addGratitude()" style="background:var(--success); border:none; color:white; padding:12px; border-radius:12px;"><i class="ph ph-plus-bold"></i></button>
                </div>
                <div id="gratitudeList" style="margin-top:15px;"></div>
            </div>
        </section>

        <section id="home" class="page">
            <div class="card" style="text-align: center;">
                <h3>Como se sente agora?</h3>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0;">
                    <button onclick="saveMood(5)" style="font-size:2rem; border:none; background:none; cursor:pointer;">🤩</button>
                    <button onclick="saveMood(4)" style="font-size:2rem; border:none; background:none; cursor:pointer;">😊</button>
                    <button onclick="saveMood(4)" style="font-size:2rem; border:none; background:none; cursor:pointer;">😌</button>
                    <button onclick="saveMood(4)" style="font-size:2rem; border:none; background:none; cursor:pointer;">🙏</button>
                    <button onclick="saveMood(3)" style="font-size:2rem; border:none; background:none; cursor:pointer;">😴</button>
                    <button onclick="saveMood(2)" style="font-size:2rem; border:none; background:none; cursor:pointer;">😟</button>
                    <button onclick="saveMood(1)" style="font-size:2rem; border:none; background:none; cursor:pointer;">😔</button>
                    <button onclick="saveMood(1)" style="font-size:2rem; border:none; background:none; cursor:pointer;">😤</button>
                </div>
            </div>
        </section>

        <section id="comunidade" class="page">
            <div class="card">
                <h3><i class="ph ph-users-three"></i> Mural Positivo</h3>
                <textarea id="comMsg" placeholder="Escreva algo inspirador..."></textarea>
                <button onclick="sendCommunityMsg()" class="btn-main">Enviar Apoio</button>
            </div>
            <div id="communityWall"></div>
        </section>

        <section id="breathe" class="page">
            <div class="card" style="text-align: center;">
                <h3>Foco e Calma</h3>
                <div class="circle-wrap"><div id="bCircle" class="circle">Paz</div></div>
                <button id="bBtn" onclick="toggleBreathe()" class="btn-main">Começar</button>
            </div>
        </section>

        <section id="refugio" class="page">
            <h3><i class="ph ph-book-open"></i> Refúgio</h3>
            <div class="card"><h4>Força</h4><p>"Tudo posso naquele que me fortalece."</p></div>
            <div class="card"><h4>Descanso</h4><p>"Vinde a mim e eu vos aliviarei."</p></div>
            <div class="card"><h4>Esperança</h4><p>"A alegria vem pela manhã."</p></div>
        </section>

        <section id="help" class="page">
            <div class="card">
                <h3>Suporte Profissional</h3>
                <button onclick="window.location.href='tel:188'" class="btn-main" style="background:var(--danger);"><i class="ph ph-phone"></i> Ligar CVV 188</button>
            </div>
        </section>

        <nav class="nav-bar">
            <button class="nav-item active" onclick="tab('stats')"><i class="ph ph-chart-bar"></i><span>Mural</span></button>
            <button class="nav-item" onclick="tab('home')"><i class="ph ph-plus-circle"></i><span>Mood</span></button>
            <button class="nav-item" onclick="tab('comunidade')"><i class="ph ph-users-three"></i><span>Apoio</span></button>
            <button class="nav-item" onclick="tab('breathe')"><i class="ph ph-wind"></i><span>Respira</span></button>
            <button class="nav-item" onclick="tab('refugio')"><i class="ph ph-book"></i><span>Refúgio</span></button>
            <button class="nav-item" onclick="tab('help')"><i class="ph ph-lifebuoy"></i><span>Ajuda</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADKE067DT_uAovdsC0RSMqWkkdKux2_4Y",
            authDomain: "mental-leve-69d87.firebaseapp.com",
            databaseURL: "https://mental-leve-69d87-default-rtdb.firebaseio.com",
            projectId: "mental-leve-69d87",
            storageBucket: "mental-leve-69d87.firebasestorage.app",
            messagingSenderId: "282074351005",
            appId: "1:282074351005:web:8088bb43ac3730d1a45b74",
            measurementId: "G-CFCXFGL7S3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let uid = localStorage.getItem('ml_uid') || 'u' + Date.now();
        localStorage.setItem('ml_uid', uid);
        let pts = 0;

        // FUNÇÃO MODO ESCURO
        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('ml_darkmode', isDark);
        };

        // CARREGAR PREFERÊNCIA DE TEMA
        if(localStorage.getItem('ml_darkmode') === 'true') document.body.classList.add('dark-mode');

        // SINCRONIZAÇÃO FIREBASE
        onValue(ref(db, 'users/' + uid), (snap) => {
            const data = snap.val();
            if(data) {
                pts = data.points || 0;
                document.getElementById('pts').innerText = pts;
                updateLevel(pts);
                if(data.history) renderChart(Object.values(data.history));
                if(data.gratitudes) renderGrat(Object.values(data.gratitudes));
            }
        });

        onValue(ref(db, 'community'), (snap) => {
            const wall = document.getElementById('communityWall');
            wall.innerHTML = "";
            const msgs = snap.val();
            if(msgs) {
                Object.values(msgs).reverse().slice(0, 5).forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'msg-bubble';
                    d.innerHTML = `${m.text} <br><small style="opacity:0.6; font-size:0.6rem;">Mensagem de Apoio</small>`;
                    wall.appendChild(d);
                });
            }
        });

        function updateLevel(p) {
            let lvl = "Semente da Paz"; let lim = 100;
            if(p >= 500) { lvl = "Carvalho Resiliente"; lim = 1000; }
            else if(p >= 200) { lvl = "Árvore Forte"; lim = 500; }
            else if(p >= 50) { lvl = "Broto de Calma"; lim = 200; }
            document.getElementById('levelLabel').innerText = lvl;
            document.getElementById('levelBar').style.width = Math.min((p / lim) * 100, 100) + "%";
        }

        window.saveMood = (v) => {
            push(ref(db, `users/${uid}/history`), v);
            addPts(10); tab('stats');
        };

        window.sendCommunityMsg = () => {
            const el = document.getElementById('comMsg');
            if(!el.value) return;
            push(ref(db, 'community'), { text: el.value, time: serverTimestamp() });
            el.value = ""; addPts(20);
        };

        window.addGratitude = () => {
            const i = document.getElementById('gratitudeIn');
            if(!i.value) return;
            push(ref(db, `users/${uid}/gratitudes`), i.value);
            i.value = ""; addPts(15);
        };

        function addPts(v) {
            pts += v;
            set(ref(db, `users/${uid}/points`), pts);
        }

        function renderChart(history) {
            const container = document.getElementById('moodChart');
            container.innerHTML = "";
            history.slice(-7).forEach((v, i) => {
                const b = document.createElement('div');
                b.className = 'bar'; b.style.height = (v * 20) + "%";
                b.innerHTML = `<div class="bar-label">R${i+1}</div>`;
                container.appendChild(b);
            });
        }

        function renderGrat(list) {
            const c = document.getElementById('gratitudeList');
            c.innerHTML = list.reverse().slice(0, 3).map(t => `<div class="msg-bubble">✨ ${t}</div>`).join('');
        }

        let bActive = false, bInt;
        window.toggleBreathe = () => {
            const btn = document.getElementById('bBtn');
            const circ = document.getElementById('bCircle');
            if(!bActive) {
                bActive = true; btn.innerText = "Parar";
                const cycle = () => {
                    if(!bActive) return;
                    circ.innerText = "Inspire"; circ.classList.add('expanding');
                    setTimeout(() => {
                        if(!bActive) return;
                        circ.innerText = "Solte"; circ.classList.remove('expanding');
                        bInt = setTimeout(cycle, 4000);
                    }, 4000);
                };
                cycle();
            } else {
                bActive = false; clearTimeout(bInt);
                btn.innerText = "Começar"; addPts(5);
            }
        };

        window.tab = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        };
    </script>
</body>
</html>
