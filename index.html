<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenteLeve Pro - Liga Jovem</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text-main: #1e293b; --text-sub: #64748b;
            --primary: #6366f1; --accent: #818cf8; --danger: #ef4444; --success: #10b981;
            --border: #e2e8f0;
        }

        .dark-mode {
            --bg: #0f172a; --card: #1e293b; --text-main: #f1f5f9; --text-sub: #94a3b8;
            --primary: #818cf8; --accent: #4f46e5; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; transition: all 0.2s ease; }
        body { background-color: #cbd5e0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-main); }

        #app {
            width: 100%; max-width: 450px; background: var(--bg);
            min-height: 100vh; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1); padding-bottom: 90px;
        }

        header {
            padding: 30px 20px; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }

        .user-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .points-box { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 15px; text-align: center; backdrop-filter: blur(5px); }
        
        .progress-container { width: 100%; height: 8px; background: rgba(0,0,0,0.1); border-radius: 10px; margin-top: 15px; }
        .progress-bar { height: 100%; background: #fff; width: 0%; border-radius: 10px; transition: width 1s ease; }

        .page { display: none; padding: 15px; animation: slideUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 20px; border-radius: 24px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* GRÁFICO PROFISSIONAL */
        .chart-wrapper { height: 180px; display: flex; align-items: flex-end; justify-content: space-around; padding-top: 20px; margin-top: 10px; background: rgba(255,255,255,0.5); border-radius: 20px; }
        .chart-column { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .chart-bar { width: 30px; background: var(--primary); border-radius: 8px 8px 4px 4px; transition: height 1s cubic-bezier(0.4, 0, 0.2, 1); min-height: 5px; }
        .chart-day { font-size: 0.65rem; margin-top: 8px; font-weight: 700; color: var(--text-sub); }

        .mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        .mood-btn { aspect-ratio: 1; border-radius: 18px; border: 1px solid var(--border); background: var(--card); font-size: 1.8rem; cursor: pointer; }
        .mood-btn:active { transform: scale(0.9); }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 450px;
            background: var(--card); display: flex; justify-content: space-around;
            padding: 12px; border-top: 1px solid var(--border); border-radius: 20px 20px 0 0;
        }
        .nav-item { border: none; background: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 0.65rem; font-weight: 700; margin-top: 4px; }

        .circle-wrap { height: 200px; display: flex; align-items: center; justify-content: center; }
        .circle { width: 120px; height: 120px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; transition: 4s ease-in-out; }
        .expanding { transform: scale(1.5); background: var(--success); }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <div class="user-header">
                <div>
                    <h2 style="font-size: 1.4rem;">MenteLeve</h2>
                    <p id="levelTitle" style="font-size: 0.8rem; opacity: 0.9; font-weight: 600;">Carregando nível...</p>
                </div>
                <div class="points-box">
                    <div id="displayPts" style="font-size: 1.2rem; font-weight: 700;">0</div>
                    <div style="font-size: 0.6rem; letter-spacing: 1px;">PONTOS</div>
                </div>
            </div>
            <div class="progress-container">
                <div id="levelProgress" class="progress-bar"></div>
            </div>
        </header>

        <section id="stats" class="page active">
            <div class="card">
                <h3 style="font-size: 1rem; margin-bottom: 15px;"><i class="ph ph-chart-line-up"></i> Sua Evolução Emocional</h3>
                <div class="chart-wrapper" id="chartWrapper">
                    </div>
            </div>
            
            <div id="streakCard" class="card" style="background: linear-gradient(135deg, #ff9f43, #ff6b6b); color: white; border: none; display: none;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="ph ph-fire-fill" style="font-size: 2.5rem;"></i>
                    <div>
                        <h4 style="font-size: 1.1rem;">Fogo Interior!</h4>
                        <p style="font-size: 0.85rem;">Você está mantendo sua mente leve por <span id="streakDays">1</span> dia(s) seguido(s)!</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3><i class="ph ph-heart-straight"></i> Gratidão</h3>
                <div style="display: flex; gap: 8px; margin-top: 10px;">
                    <input type="text" id="gratInput" placeholder="Pelo que agradece?" style="flex:1; border: 1px solid var(--border); padding: 10px; border-radius: 12px; outline: none;">
                    <button onclick="addGratitude()" style="background:var(--success); color:white; border:none; padding: 10px 15px; border-radius: 12px;"><i class="ph ph-plus-bold"></i></button>
                </div>
                <div id="gratList" style="margin-top: 15px;"></div>
            </div>
        </section>

        <section id="home" class="page">
            <div class="card" style="text-align: center;">
                <h3>Como você está agora?</h3>
                <div class="mood-grid">
                    <button class="mood-btn" onclick="saveMood(5)">🤩</button>
                    <button class="mood-btn" onclick="saveMood(4)">😊</button>
                    <button class="mood-btn" onclick="saveMood(4)">😌</button>
                    <button class="mood-btn" onclick="saveMood(4)">🙏</button>
                    <button class="mood-btn" onclick="saveMood(3)">😴</button>
                    <button class="mood-btn" onclick="saveMood(2)">😟</button>
                    <button class="mood-btn" onclick="saveMood(1)">😔</button>
                    <button class="mood-btn" onclick="saveMood(1)">😤</button>
                </div>
                <p style="color: var(--text-sub); font-size: 0.8rem;">Registrar seu humor ajuda no seu autoconhecimento.</p>
            </div>
        </section>

        <section id="breathe" class="page">
            <div class="card" style="text-align: center;">
                <h3>Exercício de Foco</h3>
                <div class="circle-wrap">
                    <div id="bCircle" class="circle">Paz</div>
                </div>
                <button id="bBtn" onclick="toggleBreathe()" class="btn-main">Iniciar Respiração</button>
            </div>
        </section>

        <nav class="nav-bar">
            <button class="nav-item active" onclick="showPage('stats')"><i class="ph ph-chart-bar-fill"></i><span>Mural</span></button>
            <button class="nav-item" onclick="showPage('home')"><i class="ph ph-plus-circle-fill"></i><span>Humor</span></button>
            <button class="nav-item" onclick="showPage('breathe')"><i class="ph ph-wind-fill"></i><span>Respira</span></button>
            <button class="nav-item" onclick="showPage('help')"><i class="ph ph-lifebuoy-fill"></i><span>Ajuda</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADKE067DT_uAovdsC0RSMqWkkdKux2_4Y",
            authDomain: "mental-leve-69d87.firebaseapp.com",
            databaseURL: "https://mental-leve-69d87-default-rtdb.firebaseio.com",
            projectId: "mental-leve-69d87",
            storageBucket: "mental-leve-69d87.firebasestorage.app",
            messagingSenderId: "282074351005",
            appId: "1:282074351005:web:8088bb43ac3730d1a45b74",
            measurementId: "G-CFCXFGL7S3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let userId = localStorage.getItem('ml_uid') || 'u' + Date.now();
        localStorage.setItem('ml_uid', userId);
        let userPoints = 0;

        // INICIALIZAÇÃO E SINCRONIZAÇÃO REAL-TIME
        onValue(ref(db, 'users/' + userId), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                userPoints = data.points || 0;
                updateStats(data);
            }
        }, (error) => { console.error(error); });

        function updateStats(data) {
            // Atualiza Pontos e Nível
            document.getElementById('displayPts').innerText = userPoints;
            let level = "Semente da Paz";
            let limit = 100;
            if(userPoints >= 500) { level = "Mestre da Resiliência"; limit = 1000; }
            else if(userPoints >= 200) { level = "Árvore Forte"; limit = 500; }
            else if(userPoints >= 50) { level = "Broto Consciente"; limit = 200; }
            
            document.getElementById('levelTitle').innerText = level;
            document.getElementById('levelProgress').style.width = Math.min((userPoints / limit) * 100, 100) + "%";

            // Atualiza Gráfico
            if(data.history) renderMoodChart(Object.values(data.history));
            
            // Atualiza Gratidão
            if(data.gratitudes) renderGratitudes(Object.values(data.gratitudes));
        }

        function renderMoodChart(history) {
            const wrapper = document.getElementById('chartWrapper');
            wrapper.innerHTML = "";
            const last7 = history.slice(-7);
            
            last7.forEach((val, i) => {
                const col = document.createElement('div');
                col.className = 'chart-column';
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.height = "0%";
                col.innerHTML = `<div class="chart-day">R${i+1}</div>`;
                col.prepend(bar);
                wrapper.appendChild(col);
                
                // Força animação
                setTimeout(() => {
                    bar.style.height = (val * 20) + "%";
                }, 100);
            });
        }

        window.saveMood = (val) => {
            push(ref(db, `users/${userId}/history`), val);
            addPoints(10);
            alert("Humor registrado com sucesso!");
            showPage('stats');
        };

        window.addGratitude = () => {
            const input = document.getElementById('gratInput');
            if(!input.value) return;
            push(ref(db, `users/${userId}/gratitudes`), input.value);
            input.value = "";
            addPoints(15);
        };

        function renderGratitudes(list) {
            const container = document.getElementById('gratList');
            container.innerHTML = list.reverse().slice(0, 3).map(t => `
                <div style="background:var(--bg); padding:12px; border-radius:15px; font-size:0.85rem; margin-bottom:8px; border-left:4px solid var(--primary)">
                    ${t}
                </div>
            `).join('');
        }

        function addPoints(v) {
            userPoints += v;
            set(ref(db, `users/${userId}/points`), userPoints);
        }

        // RESPIRAÇÃO
        let bActive = false, bInt;
        window.toggleBreathe = () => {
            const btn = document.getElementById('bBtn');
            const circ = document.getElementById('bCircle');
            if(!bActive) {
                bActive = true; btn.innerText = "Parar Exercício";
                const cycle = () => {
                    if(!bActive) return;
                    circ.innerText = "Inspire"; circ.classList.add('expanding');
                    setTimeout(() => {
                        if(!bActive) return;
                        circ.innerText = "Solte"; circ.classList.remove('expanding');
                        bInt = setTimeout(cycle, 4000);
                    }, 4000);
                };
                cycle();
            } else {
                bActive = false; clearTimeout(bInt);
                btn.innerText = "Retomar Exercício"; circ.classList.remove('expanding');
                addPoints(5);
            }
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        // Torna funções globais para o HTML
        window.addGratitude = addGratitude;
    </script>
</body>
</html>
