<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenteLeve - Seu Web App</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f8faff; --card: #ffffff; --text: #2d3436;
            --primary: #6c63ff; --accent: #a29bfe;
            --danger: #ff7675; --success: #00b894;
        }

        .dark-mode {
            --bg: #1a1a2e; --card: #16213e; --text: #e9ecef;
            --primary: #a29bfe; --accent: #6c63ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: #e0e6ed; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        #app {
            width: 100%; max-width: 450px; background: var(--bg);
            min-height: 100vh; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.1); color: var(--text); padding-bottom: 80px;
        }

        header {
            padding: 25px; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .stats-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        .carousel-container {
            margin: -20px 20px 15px 20px; background: var(--card); padding: 15px;
            border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 15px; }

        /* Grade de Humor com Variedade */
        .mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .mood-btn { border: none; background: none; font-size: 1.8rem; cursor: pointer; transition: transform 0.2s; }
        .mood-btn:active { transform: scale(1.3); }

        /* IA Chat */
        .chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 15px; }
        .bubble { padding: 12px; border-radius: 18px; font-size: 0.85rem; max-width: 85%; line-height: 1.4; }
        .bot { background: var(--primary); color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #dfe6e9; color: #2d3436; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Respiração */
        .breathing-visual {
            width: 150px; height: 150px; background: var(--primary); border-radius: 50%;
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; transition: 4s ease-in-out; box-shadow: 0 0 20px var(--accent);
        }
        .inhaling { transform: scale(1.6); background: var(--success); }

        /* Barra de Navegação */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--card);
            display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }
        .nav-btn { border: none; background: none; color: #b2bec3; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { font-size: 1.5rem; margin-bottom: 3px; }

        .btn-action { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        textarea, input { width: 100%; border: 1px solid #eee; border-radius: 12px; padding: 12px; outline: none; background: var(--card); color: var(--text); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <div>
                <h2 id="greet">Olá!</h2>
                <span id="pts-display" class="stats-badge"><i class="ph ph-sparkle"></i> <span id="points">0</span> pts</span>
            </div>
            <button onclick="toggleDarkMode()" style="background:none; border:none; color:white; font-size: 1.5rem;"><i class="ph ph-moon-stars"></i></button>
        </header>

        <div class="carousel-container">
            <p id="phrase-display" style="font-style: italic; font-size: 0.85rem;">"Respire fundo. Você está indo bem."</p>
        </div>

        <section id="dashboard" class="page active">
            <div class="card">
                <h3>Como você está se sentindo?</h3>
                <div class="mood-grid">
                    <button class="mood-btn" onclick="moodAct('😊')">😊</button>
                    <button class="mood-btn" onclick="moodAct('😌')">😌</button>
                    <button class="mood-btn" onclick="moodAct('🤩')">🤩</button>
                    <button class="mood-btn" onclick="moodAct('🥳')">🥳</button>
                    <button class="mood-btn" onclick="moodAct('😟')">😟</button>
                    <button class="mood-btn" onclick="moodAct('😔')">😔</button>
                    <button class="mood-btn" onclick="moodAct('😤')">😤</button>
                    <button class="mood-btn" onclick="moodAct('😴')">😴</button>
                </div>
                <textarea id="diaryInput" placeholder="Quer desabafar algo? Suas notas ficam salvas aqui..."></textarea>
                <button class="btn-action" onclick="saveDiary()">Salvar Diário (+10 pts)</button>
            </div>
        </section>

        <section id="ia" class="page">
            <h3>IA Amiga 🌿</h3>
            <div class="card">
                <div class="chat-box" id="chatBox">
                    <div class="bubble bot">Olá! Eu sou sua assistente de bem-estar. Como posso ajudar seu coração hoje?</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="iaInput" placeholder="Pergunte algo...">
                    <button onclick="askIA()" style="background:var(--primary); color:white; border:none; width:50px; border-radius:12px;"><i class="ph ph-paper-plane-tilt"></i></button>
                </div>
            </div>
        </section>

        <section id="kit" class="page">
            <h3 style="text-align: center;">Exercício de Respiração</h3>
            <div class="card" style="text-align: center;">
                <div class="breathing-visual" id="breathCircle">Iniciar</div>
                <p id="breathStatus" style="margin-bottom: 20px; font-weight: 600;">Toque no botão para começar</p>
                <button class="btn-action" id="btnBreath" onclick="handleBreath()">Começar Exercício</button>
            </div>
            
            <div class="card">
                <p style="margin-bottom: 10px; font-weight: 600;">Sons para relaxar:</p>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-action" style="background: #45aaf2;" onclick="toggleSound('chuva')">🌧️ Chuva</button>
                    <button class="btn-action" style="background: #26de81;" onclick="toggleSound('natureza')">🍃 Floresta</button>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="nav('dashboard')"><i class="ph ph-house"></i>Início</button>
            <button class="nav-btn" onclick="nav('ia')"><i class="ph ph-robot"></i>IA Amiga</button>
            <button class="nav-btn" onclick="nav('kit')"><i class="ph ph-wind"></i>Respira</button>
        </nav>
    </div>

    <audio id="audio-chuva" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <audio id="audio-natureza" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script>
        // --- SISTEMA DE PONTOS E PERSISTÊNCIA ---
        let pts = parseInt(localStorage.getItem('userPts')) || 0;
        function updatePts(val) {
            pts += val;
            localStorage.setItem('userPts', pts);
            document.getElementById('points').innerText = pts;
        }

        // --- NAVEGAÇÃO ---
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id !== 'kit') stopBreathing();
        }

        // --- HUMOR E DIÁRIO ---
        function moodAct(emoji) {
            alert("Humor " + emoji + " registrado! Lembre-se: seus sentimentos são válidos.");
            updatePts(5);
        }
        function saveDiary() {
            localStorage.setItem('savedDiary', document.getElementById('diaryInput').value);
            updatePts(10);
            alert("Diário atualizado com sucesso!");
        }

        // --- IA PSICÓLOGA ---
        const knowledge = {
            "ansiedade": "A ansiedade é uma onda. Não lute contra ela, apenas flutue. Vamos tentar o exercício de respiração?",
            "triste": "Sinto muito que esteja assim. Às vezes o coração precisa de repouso. O que te faria sentir 1% melhor agora?",
            "medo": "O medo é o modo de proteção do cérebro ativado. Respire fundo e foque em algo que você pode tocar agora.",
            "deus": "Ele está contigo em cada suspiro. 'Não temas, porque eu sou contigo.' (Isaías 41:10)",
            "sozinho": "Você não está só. Eu estou aqui para te ouvir e existem pessoas que te amam.",
            "ajuda": "Se estiver muito difícil, você pode ligar para o 188 (CVV). Falar salva vidas."
        };

        function askIA() {
            const input = document.getElementById('iaInput');
            const chat = document.getElementById('chatBox');
            if(!input.value) return;

            chat.innerHTML += `<div class="bubble user">${input.value}</div>`;
            const msg = input.value.toLowerCase();
            let res = "Entendo perfeitamente. Como você se sente falando sobre isso?";

            for(let key in knowledge) { if(msg.includes(key)) res = knowledge[key]; }

            setTimeout(() => {
                chat.innerHTML += `<div class="bubble bot">${res}</div>`;
                chat.scrollTop = chat.scrollHeight;
                updatePts(2);
            }, 600);
            input.value = "";
        }

        // --- EXERCÍCIO DE RESPIRAÇÃO ---
        let breathing = false;
        function handleBreath() {
            const btn = document.getElementById('btnBreath');
            const circle = document.getElementById('breathCircle');
            const status = document.getElementById('breathStatus');

            if(!breathing) {
                breathing = true;
                btn.innerText = "Parar Exercício"; btn.style.background = "var(--danger)";
                startCycle();
            } else {
                stopBreathing();
            }
        }

        function startCycle() {
            const circle = document.getElementById('breathCircle');
            const status = document.getElementById('breathStatus');
            const run = () => {
                if(!breathing) return;
                status.innerText = "Inspire pelo nariz...";
                circle.classList.add('inhaling');
                setTimeout(() => {
                    if(!breathing) return;
                    status.innerText = "Solte pela boca...";
                    circle.classList.remove('inhaling');
                    setTimeout(run, 4000);
                }, 4000);
            }
            run();
        }

        function stopBreathing() {
            breathing = false;
            const btn = document.getElementById('btnBreath');
            btn.innerText = "Começar Exercício"; btn.style.background = "var(--primary)";
            document.getElementById('breathCircle').classList.remove('inhaling');
            document.getElementById('breathCircle').innerText = "Iniciar";
            document.getElementById('breathStatus').innerText = "Exercício encerrado.";
            updatePts(20);
        }

        // --- UTILITÁRIOS ---
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function toggleSound(type) {
            const a = document.getElementById('audio-' + type);
            a.paused ? a.play() : a.pause();
        }

        // Carregar Diário e Pontos ao iniciar
        document.getElementById('points').innerText = pts;
        document.getElementById('diaryInput').value = localStorage.getItem('savedDiary') || "";
        const h = new Date().getHours();
        document.getElementById('greet').innerText = h < 12 ? "Bom dia!" : h < 18 ? "Boa tarde!" : "Boa noite!";

        const frases = ["Você é forte.", "Respire, tudo passa.", "Um passo de cada vez.", "O Senhor é meu pastor."];
        setInterval(() => {
            document.getElementById('phrase-display').innerText = frases[Math.floor(Math.random()*frases.length)];
        }, 5000);
    </script>
</body>
</html>
